<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le Cœur d'Astéria</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Times,Helvetica,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
}

.logo{
    width:220px;
    margin-bottom:40px;
}

h2{
    font-weight:normal;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:18px;
    font-size:24px;
    text-align:center;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:10px;
    background:#c89b3c;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#d8ad52;
}

#message{
    margin-top:25px;
    color:#ff6666;
    min-height:30px;
}

</style>

</head>
<body>

<div class="container">

    <!-- Remplace logo.png par ton logo -->
    <img src="logo.png" class="logo">

    <h2>
        Le Cœur d'Astéria reconnaît ceux qui ont découvert la vérité.<br><br>
        Entrez le code à 3 chiffres.
    </h2>

    <input
        type="password"
        id="code"
        maxlength="3"
        placeholder="•••">

    <button onclick="verifier()">
        Valider
    </button>

    <div id="message"></div>

</div>

<script>

const BON_CODE = "255";   // ← Mets ici ton vrai code

function verifier(){

    let code = document.getElementById("code").value;

    if(code === BON_CODE){

        // Redirection
        window.location.href="indice.html";

    }else{

        document.getElementById("message").innerHTML =
        "Code incorrect.";

    }

}

</script>

</body>
</html>
